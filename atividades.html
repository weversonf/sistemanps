<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makro Gestão — Atividades</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-card">
    <h1>Makro<span>Gestão</span></h1>
    <p>Faça login para continuar</p>
    <div class="login-error" id="loginError">Credenciais inválidas</div>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
    <label>Senha</label>
    <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    <button class="btn btn-red" onclick="handleLogin()">Entrar</button>
    <div style="text-align:center;margin-top:8px"><a href="#" onclick="handleForgotPassword();return false" style="font-size:11px;color:var(--muted)">Esqueci minha senha</a></div>
    <div style="text-align:center;margin-top:12px"><a href="#" onclick="openRegister();return false" style="font-size:12px;color:var(--muted)">Primeiro acesso? Criar conta</a></div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><i data-lucide="hexagon" style="width:20px;height:20px;color:var(--red)"></i>Makro<span>Gestão</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-href="dashboard.html" href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a class="nav-item" data-href="nps.html" href="nps.html"><i data-lucide="bar-chart-3"></i> Pesquisa NPS</a>
      <a class="nav-item active" data-href="atividades.html" href="atividades.html" aria-current="page"><i data-lucide="columns-3"></i> Atividades</a>
      <a class="nav-item" data-href="usuarios.html" href="usuarios.html"><i data-lucide="users"></i> Usuários</a>
    </nav>
    <div class="sidebar-user">
      <strong id="userName">Admin</strong>
      <div style="margin-top:8px"><button class="btn btn-ghost btn-xs" onclick="handleLogout()">Sair</button></div>
    </div>
  </aside>

  <div class="main">
    <header class="header">
      <div class="header-title">Atividades</div>
      <div class="header-actions">
        <button class="btn btn-sm btn-ghost" onclick="handleLogout()" style="display:flex;align-items:center;gap:5px"><i data-lucide="log-out" style="width:14px;height:14px"></i> Sair</button>
      </div>
    </header>
    <div class="content">
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn btn-red btn-sm" onclick="openAddColumn()"><i data-lucide="plus" style="width:14px;height:14px"></i> Nova Coluna</button>
        <button class="btn btn-ghost btn-sm" onclick="openAddCard()"><i data-lucide="plus" style="width:14px;height:14px"></i> Nova Tarefa</button>
      </div>
      <div class="kanban-board" id="kanbanBoard"><div class="loading">Carregando...</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/kanban.js"></script>
<script>
/* ── BYPASS LOGIN ── */
currentUser = {uid:'local',email:'local@admin',nome:'Admin',tipo:'admin'};
document.getElementById('loginScreen').style.display='none';
document.getElementById('app').style.display='flex';
document.getElementById('userName').textContent='Admin';
setActiveNav();

/* ── INIT ── */
loadKanban();
lucide.createIcons();
</script>
</body>
</html>
